syntax = "proto3";

option java_multiple_files = true;

package anki.stats;

import "anki/generic.proto";
import "anki/cards.proto";

service StatsService {
  rpc CardStats(cards.CardId) returns (CardStatsResponse);
  rpc GetReviewLogs(cards.CardId) returns (ReviewLogs);
  rpc Graphs(GraphsRequest) returns (GraphsResponse);
  rpc GetGraphPreferences(generic.Empty) returns (GraphPreferences);
  rpc SetGraphPreferences(GraphPreferences) returns (generic.Empty);
  // Speedrun: trivial engine-pipeline smoke test. Returns the total card count
  // and a fixed tag, proving a new Rust RPC reaches Python end to end.
  rpc McatEngineStatus(generic.Empty) returns (McatEngineStatusResponse);
  // Speedrun: per-topic mastery breakdown. For each deck (topic) matching the
  // search, returns how many cards are mastered and the average FSRS recall,
  // computed in a single pass so it stays fast on large collections.
  rpc McatMastery(McatMasteryRequest) returns (McatMasteryResponse);
  // Speedrun: a single honest deck score for the search, with a confidence
  // range whose width comes from how many cards are still unreviewed.
  rpc McatDeckScore(McatDeckScoreRequest) returns (McatDeckScoreResponse);
  // Speedrun: per-topic pace model built on the answer time Anki already
  // records. Returns each topic's recent accuracy, mean answer time, and the
  // pace-ladder target it has earned, plus the weakness score used to order
  // study. This is the read side of the pace-weakness review order.
  rpc McatPace(McatPaceRequest) returns (McatPaceResponse);
  // Speedrun: the memory->performance bridge. Discounts the honest memory
  // score by a measured transfer factor to estimate expected accuracy on new
  // exam-style questions, with a confidence range. When no transfer factor has
  // been measured yet, performance is shown equal to memory (the honest
  // default) rather than inventing a discount.
  rpc McatPerformance(McatPerformanceRequest) returns (McatPerformanceResponse);
  // Speedrun: a projected MCAT score on the real 472-528 scale, with a range,
  // confidence, and reasons. Implements the give-up rule in the engine (so the
  // phone follows the same rule): a score is only shown once there is enough
  // graded-review evidence and topic coverage.
  rpc McatReadiness(McatReadinessRequest) returns (McatReadinessResponse);
  // Speedrun: the whole dashboard in one round trip. Computes mastery, deck
  // score, performance, readiness and pace from a SINGLE shared card+revlog
  // scan instead of five independent full-collection scans (and without
  // readiness re-running performance internally). Every field is byte-for-byte
  // identical to calling the matching single RPC; this only removes the
  // redundant scans that made the naive dashboard bundle ~the sum of its parts.
  rpc McatDashboard(McatDashboardRequest) returns (McatDashboardResponse);
}

// Implicitly includes any of the above methods that are not listed in the
// backend service.
service BackendStatsService {}

message ReviewLogs {
  repeated CardStatsResponse.StatsRevlogEntry entries = 1;
}

message CardStatsResponse {
  message StatsRevlogEntry {
    int64 time = 1;
    RevlogEntry.ReviewKind review_kind = 2;
    uint32 button_chosen = 3;
    // seconds
    uint32 interval = 4;
    // per mill
    uint32 ease = 5;
    float taken_secs = 6;
    optional cards.FsrsMemoryState memory_state = 7;
    // seconds
    uint32 last_interval = 8;
  }
  repeated StatsRevlogEntry revlog = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  string deck = 4;
  // Unix timestamps
  int64 added = 5;
  optional int64 first_review = 6;
  optional int64 latest_review = 7;
  optional int64 due_date = 8;
  optional int32 due_position = 9;
  // days
  uint32 interval = 10;
  // per mill
  uint32 ease = 11;
  uint32 reviews = 12;
  uint32 lapses = 13;
  float average_secs = 14;
  float total_secs = 15;
  string card_type = 16;
  string notetype = 17;
  optional cards.FsrsMemoryState memory_state = 18;
  // not set if due date/state not available
  optional float fsrs_retrievability = 19;
  string custom_data = 20;
  string preset = 21;
  optional string original_deck = 22;
  optional float desired_retention = 23;
  repeated float fsrs_params = 24;
}

message GraphsRequest {
  string search = 1;
  uint32 days = 2;
}

message McatEngineStatusResponse {
  uint32 total_cards = 1;
  string engine_tag = 2;
}

message McatMasteryRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

message McatMasteryResponse {
  // Mastery numbers for a single topic (deck).
  message TopicMastery {
    int64 deck_id = 1;
    // Human-readable deck name, e.g. "MCAT::Biochemistry".
    string topic = 2;
    // All cards in this topic that matched the search.
    uint32 total_cards = 3;
    // Cards with an FSRS memory state (i.e. reviewed at least once).
    uint32 rated_cards = 4;
    // Cards whose current recall is at or above mastered_threshold.
    uint32 mastered_cards = 5;
    // Mean recall (0-1) over rated_cards; 0 when there are none.
    float average_recall = 6;
  }
  repeated TopicMastery topics = 1;
  // Recall cutoff used to decide whether a card counts as mastered.
  float mastered_threshold = 2;
  // Collection-wide totals across every returned topic.
  uint32 total_cards = 3;
  uint32 mastered_cards = 4;
}

message McatDeckScoreRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

message McatDeckScoreResponse {
  // Honest deck score (0-1): the point estimate of true mastery over the
  // scorable cards. It projects the observed mastery rate onto unreviewed
  // cards, so it equals mastered/scorable exactly once everything is reviewed.
  float score = 1;
  // Lower/upper bounds of a 95% confidence range for `score`. The width comes
  // from how many cards are still unreviewed (a Wilson interval on the reviewed
  // sample, projected over the unseen cards); it collapses to a point when the
  // whole deck has been reviewed.
  float score_lower = 2;
  float score_upper = 3;
  // All cards that matched the search (every card counts toward the score).
  uint32 total_cards = 4;
  // Cards that count toward the score. Equal to total_cards.
  uint32 scorable_cards = 5;
  // Scorable cards that have been reviewed at least once (have memory state).
  uint32 rated_cards = 6;
  // Scorable cards whose current recall is at or above mastered_threshold.
  uint32 mastered_cards = 7;
  // Scorable cards never reviewed yet (counted, but unproven).
  uint32 unseen_cards = 8;
  // Recall cutoff used to decide whether a card counts as mastered.
  float mastered_threshold = 10;

  reserved 9, 11;  // formerly give_up_cards / give_up_lapses (removed)
}

message McatPaceRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

message McatPaceResponse {
  // Pace numbers for a single topic (deck), over the recent window.
  message TopicPace {
    int64 deck_id = 1;
    // Human-readable deck name, e.g. "MCAT::Biochemistry".
    string topic = 2;
    // Graded reviews for this topic inside the recent window.
    uint32 window_reviews = 3;
    // Fraction correct (button >= Hard) over the window; 0 with no reviews.
    float accuracy = 4;
    // Mean answer time in ms over the window; 0 with no reviews.
    float mean_answer_ms = 5;
    // Current pace target in ms for this topic; 0 means unlimited (no timer).
    uint32 target_ms = 6;
    // Ladder rung index (0 = unlimited ... 4 = goal).
    uint32 rung = 7;
    // Human-readable phase label, e.g. "Unlimited" or "90s goal".
    string phase = 8;
    // True when accuracy and speed already clear the next shorter rung but the
    // window does not yet hold enough reviews to lock it in.
    bool ready_for_next_rung = 9;
    // Relative weakness used to order study (higher = surfaced sooner).
    float weakness = 10;
  }
  repeated TopicPace topics = 1;
  // Goal target in ms at the top of the ladder (the 90s goal).
  uint32 goal_ms = 2;
  // Minimum graded reviews in the window before a rung can advance.
  uint32 min_window_reviews = 3;
  // Minimum accuracy before a rung can advance.
  float min_accuracy = 4;
  // Months until the exam (from the stored exam date); -1 when unset.
  float exam_months_remaining = 5;
  // Starting rung implied by the exam date.
  uint32 start_rung = 6;
  // Recent-window length in days.
  uint32 window_days = 7;
}

message McatPerformanceRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

message McatPerformanceResponse {
  // Expected exam performance for a single topic (deck).
  message TopicPerformance {
    int64 deck_id = 1;
    // Human-readable deck name, e.g. "MCAT::Biochemistry".
    string topic = 2;
    // Mean FSRS recall (0-1) over this topic's rated cards.
    float memory_recall = 3;
    // memory_recall discounted by the transfer factor (0-1).
    float performance = 4;
    // Range on `performance`, from the transfer-factor bounds.
    float perf_lower = 5;
    float perf_upper = 6;
    // Cards with an FSRS memory state (reviewed at least once).
    uint32 rated_cards = 7;
    // All cards in this topic that matched the search.
    uint32 total_cards = 8;
  }
  repeated TopicPerformance topics = 1;
  // Overall expected performance (0-1): memory score discounted by the
  // transfer factor.
  float performance = 2;
  // Range on overall `performance`, from the memory Wilson bounds combined
  // with the transfer-factor bounds.
  float perf_lower = 3;
  float perf_upper = 4;
  // Measured memory->performance transfer factor actually applied (0-1).
  float transfer_factor = 5;
  // Bounds on the transfer factor.
  float transfer_factor_lower = 6;
  float transfer_factor_upper = 7;
  // False when no transfer factor has been measured yet; in that case the
  // factor defaults to 1.0 and performance is shown equal to memory.
  bool transfer_measured = 8;
  // Cards reviewed at least once across the search.
  uint32 rated_cards = 9;
  // Cards that count toward the score across the search.
  uint32 scorable_cards = 10;
}

message McatReadinessRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

message McatReadinessResponse {
  // True only when the give-up rule passes (enough graded reviews AND enough
  // topic coverage); when false, only the evidence fields below are meaningful.
  bool has_score = 1;
  // Projected MCAT score on the 472-528 scale.
  float projected_score = 2;
  // Range on `projected_score`, mapped from the performance bounds.
  float score_lower = 3;
  float score_upper = 4;
  // Endpoints of the real MCAT scale.
  float scale_min = 5;
  float scale_max = 6;
  // Overall expected performance (0-1) the projection is built from.
  float performance = 7;
  // Fraction of topics (decks with cards) that have >=1 rated card.
  float topic_coverage = 8;
  // Count of real review-kind revlog entries for the searched cards.
  uint32 graded_reviews = 9;
  // Minimum graded reviews required before a score is shown.
  uint32 min_graded_reviews = 10;
  // Minimum topic coverage required before a score is shown.
  float min_topic_coverage = 11;
  // Confidence label derived from topic coverage: "Low"/"Medium"/"High".
  string confidence = 12;
  // Human-readable drivers / missing data behind the verdict.
  repeated string reasons = 13;
  // Unix seconds when this readiness snapshot was computed.
  int64 updated_at = 14;
}

message McatDashboardRequest {
  // Card search string (same syntax as the browser). Empty = whole collection.
  string search = 1;
}

// The five dashboard scores computed from one shared scan. Each field equals
// the response of the matching single RPC for the same search.
message McatDashboardResponse {
  McatMasteryResponse mastery = 1;
  McatDeckScoreResponse deck_score = 2;
  McatPerformanceResponse performance = 3;
  McatReadinessResponse readiness = 4;
  McatPaceResponse pace = 5;
}

message GraphsResponse {
  message Added {
    map<int32, uint32> added = 1;
  }
  message Intervals {
    map<uint32, uint32> intervals = 1;
  }
  message Eases {
    map<uint32, uint32> eases = 1;
    float average = 2;
  }
  message Retrievability {
    map<uint32, uint32> retrievability = 1;
    float average = 2;
    float sum_by_card = 3;
    float sum_by_note = 4;
  }
  message FutureDue {
    map<int32, uint32> future_due = 1;
    bool have_backlog = 2;
    uint32 daily_load = 3;
  }
  message Today {
    uint32 answer_count = 1;
    uint32 answer_millis = 2;
    uint32 correct_count = 3;
    uint32 mature_correct = 4;
    uint32 mature_count = 5;
    uint32 learn_count = 6;
    uint32 review_count = 7;
    uint32 relearn_count = 8;
    uint32 early_review_count = 9;
  }
  // each bucket is a 24 element vec
  message Hours {
    message Hour {
      uint32 total = 1;
      uint32 correct = 2;
    }
    repeated Hour one_month = 1;
    repeated Hour three_months = 2;
    repeated Hour one_year = 3;
    repeated Hour all_time = 4;
  }
  message ReviewCountsAndTimes {
    message Reviews {
      uint32 learn = 1;
      uint32 relearn = 2;
      uint32 young = 3;
      uint32 mature = 4;
      uint32 filtered = 5;
    }
    map<int32, Reviews> count = 1;
    map<int32, Reviews> time = 2;
  }
  // 4 element vecs for buttons 1-4
  message Buttons {
    message ButtonCounts {
      repeated uint32 learning = 1;
      repeated uint32 young = 2;
      repeated uint32 mature = 3;
    }
    ButtonCounts one_month = 1;
    ButtonCounts three_months = 2;
    ButtonCounts one_year = 3;
    ButtonCounts all_time = 4;
  }
  message CardCounts {
    message Counts {
      uint32 newCards = 1;
      uint32 learn = 2;
      uint32 relearn = 3;
      uint32 young = 4;
      uint32 mature = 5;
      uint32 suspended = 6;
      uint32 buried = 7;
    }
    // Buried/suspended cards are included in counts; suspended/buried counts
    // are 0.
    Counts including_inactive = 1;
    // Buried/suspended cards are counted separately.
    Counts excluding_inactive = 2;
  }
  message TrueRetentionStats {
    message TrueRetention {
      uint32 young_passed = 1;
      uint32 young_failed = 2;
      uint32 mature_passed = 3;
      uint32 mature_failed = 4;
    }

    TrueRetention today = 1;
    TrueRetention yesterday = 2;
    TrueRetention week = 3;
    TrueRetention month = 4;
    TrueRetention year = 5;
    TrueRetention all_time = 6;
  }

  Buttons buttons = 1;
  CardCounts card_counts = 2;
  Hours hours = 3;
  Today today = 4;
  Eases eases = 5;
  Eases difficulty = 11;
  Intervals intervals = 6;
  FutureDue future_due = 7;
  Added added = 8;
  ReviewCountsAndTimes reviews = 9;
  uint32 rollover_hour = 10;
  Retrievability retrievability = 12;
  bool fsrs = 13;
  Intervals stability = 14;
  TrueRetentionStats true_retention = 15;
}

message GraphPreferences {
  enum Weekday {
    SUNDAY = 0;
    MONDAY = 1;
    FRIDAY = 5;
    SATURDAY = 6;
  }
  Weekday calendar_first_day_of_week = 1;
  bool card_counts_separate_inactive = 2;
  bool browser_links_supported = 3;
  bool future_due_show_backlog = 4;
}

message RevlogEntry {
  enum ReviewKind {
    LEARNING = 0;
    REVIEW = 1;
    RELEARNING = 2;
    FILTERED = 3;
    MANUAL = 4;
    RESCHEDULED = 5;
  }
  int64 id = 1;
  int64 cid = 2;
  int32 usn = 3;
  uint32 button_chosen = 4;
  int32 interval = 5;
  int32 last_interval = 6;
  uint32 ease_factor = 7;
  uint32 taken_millis = 8;
  ReviewKind review_kind = 9;
}

message CardEntry {
  int64 id = 1;
  int64 note_id = 2;
  int64 deck_id = 3;
}

message DeckEntry {
  int64 id = 1;
  int64 parent_id = 2;
  int64 preset_id = 3;
}

message Dataset {
  repeated RevlogEntry revlogs = 1;
  repeated CardEntry cards = 2;
  repeated DeckEntry decks = 3;
  int64 next_day_at = 4;
}
